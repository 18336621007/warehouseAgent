<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫雷</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>扫雷</h1>
      <p class="subtitle">左键开格 · 右键插旗 · 数字格双击或双键展开</p>
    </header>

    <section class="toolbar">
      <div class="difficulty-group" role="group" aria-label="难度选择">
        <button type="button" class="btn difficulty-btn active" data-difficulty="beginner">初级</button>
        <button type="button" class="btn difficulty-btn" data-difficulty="intermediate">中级</button>
        <button type="button" class="btn difficulty-btn" data-difficulty="expert">高级</button>
        <button type="button" class="btn difficulty-btn" data-difficulty="custom">自定义</button>
      </div>
      <button type="button" class="btn btn-primary" id="new-game-btn">新游戏</button>
    </section>

    <section class="custom-panel hidden" id="custom-panel" aria-label="自定义难度">
      <label>
        宽度
        <input type="number" id="custom-cols" min="9" max="30" value="16">
      </label>
      <label>
        高度
        <input type="number" id="custom-rows" min="9" max="24" value="16">
      </label>
      <label>
        雷数
        <input type="number" id="custom-mines" min="1" value="40">
      </label>
      <button type="button" class="btn btn-primary" id="custom-apply-btn">应用</button>
      <p class="custom-error hidden" id="custom-error"></p>
    </section>

    <section class="status-bar">
      <button type="button" class="face-btn" id="face-btn" title="新游戏" aria-label="新游戏">🙂</button>
      <div class="counter" id="mine-counter" aria-label="剩余雷数">010</div>
      <div class="counter" id="timer" aria-label="计时">000</div>
    </section>

    <section class="board-wrapper">
      <div class="board" id="board" role="grid" aria-label="扫雷棋盘"></div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
